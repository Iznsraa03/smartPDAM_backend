name: Deploy Laravel Backend to VPS

on:
  push:
    branches:
      - main # Deploy akan berjalan jika ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/smart_pdam
            
            # Masuk ke maintenance mode (opsional, direkomendasikan)
            php artisan down --refresh=15 --secret="deploying"
            
            # Tarik kode terbaru dari repositori Github
            git pull origin main
            
            # Install dependensi PHP tanpa dev (memastikan lebih ringan dan aman)
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            
            # Jalankan migrasi database
            php artisan migrate --force
            
            # Bersihkan dan buat ulang cache framework
            php artisan optimize:clear
            php artisan config:cache
            php artisan event:cache
            php artisan route:cache
            php artisan view:cache
            
            # Filament: Optimalkan komponen Filament (Jika digunakan)
            php artisan filament:optimize
            
            # Matikan maintenance mode
            php artisan up
